version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-ideal-task-manager
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
  
  app:
    image: golang:1.25.4
    working_dir: /app
    volumes:
      - .:/app
    command: go run ./cmd/api/main.go
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT}
      DB_URL: ${DB_URL}
    depends_on:
      - db

volumes:
  mysqldata:
